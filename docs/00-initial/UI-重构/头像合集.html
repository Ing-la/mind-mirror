<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindMirror - 人格头像合集</title>
    <style>
        :root {
            --bg-canvas: #354230;
            --color-冲动: #cc665c;
            --color-理性: #1e2421;
            --color-记忆: #e6dfd3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-canvas);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            padding: 40px;
        }

        /* 主容器 */
        .avatar-gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 50px;
            padding: 40px;
            background: var(--bg-canvas);
            max-width: 1200px;
        }

        /* 每个头像宿主 */
        .defrag-avatar {
            position: relative;
            width: 95px;
            height: 95px;
            cursor: pointer;
        }
        .defrag-avatar-impulse {
            position: relative;
            width: 100px;
            height: 100px;
            cursor: pointer;
        }

        /* 衬底阴影层 */
        .avatar-shadow-layer {
            position: absolute;
            top: 5px; left: -5px;
            width: 100%; height: 100%;
            filter: url(#torn-heavy);
            z-index: 1;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .defrag-avatar-impulse .avatar-shadow-layer {
            top: 6px; left: -6px;
        }

        /* 前层 SVG 容器 */
        .avatar-img-layer, .avatar-img-layer-red {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            filter: url(#torn-medium);
            z-index: 2;
            overflow: hidden;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .code-avatar-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .avatar-label {
            color: var(--color-记忆);
            font-size: 0.75rem;
            text-align: center;
            margin-top: 12px;
            opacity: 0.5;
            letter-spacing: 1px;
            filter: url(#torn-light);
        }
        /* 冲动独特的大小 */
        .defrag-avatar-impulse .avatar-label {
            margin-top: 15px;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        /* ========== 各人格专属样式 ========== */

        /* --- 1. 理性 --- */
        .avatar-reason .avatar-shadow-layer {
            background-color: #cc665c;
            transform: rotate(-6deg);
        }
        .avatar-reason .avatar-img-layer {
            transform: rotate(2deg);
        }
        .avatar-reason:hover .avatar-shadow-layer { transform: rotate(4deg) translate(-4px, -4px); }
        .avatar-reason:hover .avatar-img-layer { transform: rotate(-4deg) scale(1.08); }

        /* --- 2. 冲动 (独特结构) --- */
        .avatar-impulse .avatar-shadow-layer {
            background-color: #1e2421;
            transform: rotate(8deg);
        }
        .avatar-impulse .avatar-img-layer-red {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            filter: url(#torn-medium);
            transform: rotate(-3deg);
            z-index: 2;
            overflow: hidden;
            transition: transform 0.3s;
        }
        .avatar-impulse:hover .avatar-shadow-layer { transform: rotate(-4deg) translate(4px, -4px); }
        .avatar-impulse:hover .avatar-img-layer-red { transform: rotate(6deg) scale(1.08); }

        /* --- 3. 焦虑 --- */
        .avatar-anxiety .avatar-shadow-layer {
            background-color: var(--color-理性);
            transform: rotate(-8deg);
        }
        .avatar-anxiety .avatar-img-layer { transform: rotate(3deg); }
        .avatar-anxiety:hover .avatar-shadow-layer { transform: rotate(6deg) translate(-6px, 4px); }
        .avatar-anxiety:hover .avatar-img-layer { transform: rotate(-4deg) scale(1.06); }

        /* --- 4. 完美 --- */
        .avatar-perfection .avatar-shadow-layer {
            background-color: #333;
            transform: rotate(0deg);
        }
        .avatar-perfection .avatar-img-layer { transform: rotate(0deg); border: 1px solid rgba(255,255,255,0.08); }
        .avatar-perfection:hover .avatar-shadow-layer { transform: translate(4px, 4px); background-color: var(--color-冲动); }
        .avatar-perfection:hover .avatar-img-layer { scale: 1.04; }

        /* --- 7. 逃避 --- */
        .avatar-escapist .avatar-shadow-layer {
            background-color: #3d4540;
            transform: rotate(8deg) translate(2px, 4px);
        }
        .avatar-escapist .avatar-img-layer { transform: rotate(-3deg); }
        .avatar-escapist:hover .avatar-shadow-layer {
            transform: rotate(12deg) translate(6px, 12px);
            opacity: 0.3;
        }
        .avatar-escapist:hover .avatar-img-layer {
            transform: rotate(-6deg) translate(-2px, 8px);
            filter: url(#torn-medium) grayscale(0.3);
        }

        /* --- 10. 真我 --- */
        .avatar-trueself .avatar-shadow-layer {
            background-color: var(--color-理性);
            transform: rotate(-8deg);
        }
        .avatar-trueself .avatar-img-layer { transform: rotate(3deg); }
        .avatar-trueself:hover .avatar-shadow-layer { transform: rotate(10deg) translate(-8px, 4px); }
        .avatar-trueself:hover .avatar-img-layer { transform: rotate(-8deg) scale(1.08); }

        /* ========== 新增人格（无撕裂扭曲，保持原始效果） ========== */

        /* --- 11. 天真 · 顽童 --- */
        .v-cute .avatar-shadow-layer { background-color: #1e2421; transform: rotate(-3deg); filter: none; }
        .v-cute .avatar-img-layer { transform: rotate(2deg); filter: none; }
        .v-cute:hover .avatar-shadow-layer { transform: rotate(-6deg) translate(-2px, 4px); }
        .v-cute:hover .avatar-img-layer { transform: translateY(-6px) rotate(6deg) scale(1.05); }

        /* --- 14. 激萌 · 内在精灵 --- */
        .v-cute-spirit .avatar-shadow-layer { background-color: #cc665c; transform: rotate(-5deg) translate(-4px, 4px); filter: none; }
        .v-cute-spirit .avatar-img-layer { transform: rotate(2deg); filter: none; }
        .v-cute-spirit:hover .avatar-img-layer { animation: spirit-bounce 0.6s ease-in-out infinite alternate; }

        /* --- 15. 碎裂 · 哭泣 --- */
        .v-weeping .avatar-shadow-layer { background-color: #1e2421; transform: rotate(4deg) translate(4px, 4px); opacity: 0.5; filter: none; }
        .v-weeping .avatar-img-layer { transform: rotate(-2deg); filter: none; }
        .v-weeping:hover .avatar-img-layer { animation: weeping-tremble 0.15s linear infinite; }

        /* --- 16. 爆裂 · 怒火 --- */
        .v-rage .avatar-shadow-layer { background-color: #e6dfd3; transform: rotate(-6deg) translate(-2px, -2px); filter: none; }
        .v-rage .avatar-img-layer { transform: rotate(3deg); filter: none; }
        .v-rage:hover .avatar-shadow-layer { background-color: #1e2421; transform: scale(1.15) rotate(12deg); }
        .v-rage:hover .avatar-img-layer { animation: rage-jitter 0.08s linear infinite; }

        /* ========== @keyframes 动画 ========== */
        @keyframes spirit-bounce {
            0% { transform: translateY(0) rotate(2deg) scale(1); }
            100% { transform: translateY(-8px) rotate(-4deg) scale(1.06); }
        }
        @keyframes weeping-tremble {
            0% { transform: translate(1px, 1px) rotate(-2deg); }
            25% { transform: translate(-1px, -1px) rotate(-1.5deg); }
            50% { transform: translate(-1px, 1px) rotate(-2.5deg); }
            75% { transform: translate(1px, -1px) rotate(-2deg); }
            100% { transform: translate(1px, 1px) rotate(-2deg); }
        }
        @keyframes rage-jitter {
            0% { transform: scale(1.1) translate(2px, -2px) rotate(4deg); }
            50% { transform: scale(1.1) translate(-3px, 2px) rotate(-2deg); }
            100% { transform: scale(1.1) translate(1px, -1px) rotate(5deg); }
        }
    </style>
</head>
<body>

    <div class="avatar-gallery">

        <!-- 1. 理性 -->
        <div class="defrag-avatar avatar-reason">
            <div class="avatar-shadow-layer"></div>
            <div class="avatar-img-layer">
                <svg viewBox="0 0 100 100" class="code-avatar-svg">
                    <rect width="100" height="100" fill="#1e2421"/>
                    <g stroke="rgba(141, 164, 153, 0.15)" stroke-width="0.5">
                        <line x1="10" y1="0" x2="10" y2="100"/>
                        <line x1="30" y1="0" x2="30" y2="100"/>
                        <line x1="50" y1="0" x2="50" y2="100"/>
                        <line x1="70" y1="0" x2="70" y2="100"/>
                        <line x1="90" y1="0" x2="90" y2="100"/>
                        <line x1="0" y1="20" x2="100" y2="20"/>
                        <line x1="0" y1="40" x2="100" y2="40"/>
                        <line x1="0" y1="60" x2="100" y2="60"/>
                        <line x1="0" y1="80" x2="100" y2="80"/>
                    </g>
                    <path d="M30,25 L65,15 L75,45 L40,50 Z" fill="#e6dfd3" opacity="0.9"/>

            </div>
            <div class="avatar-label">纯代码 · 理性</div>
        </div>

        <!-- 2. 冲动 -->
        <div class="defrag-avatar-impulse avatar-impulse">
            <div class="avatar-shadow-layer"></div>
            <div class="avatar-img-layer-red">
                <svg viewBox="0 0 100 100" class="code-avatar-svg">
                    <rect width="100" height="100" fill="#4a1c18"/>
                    <polygon points="10,20 90,10 80,80 30,90" fill="#aa443c" opacity="0.6"/>
                    <polygon points="25,5 95,30 70,95 5,60" fill="#cc665c" opacity="0.8"/>
                    <polygon points="35,35 75,25 65,75 20,65" fill="#e6dfd3" opacity="0.9" />
                    <path d="M40,40 Q30,60 55,55 Q70,40 50,45 Q45,30 40,40 Z" fill="#1e2421"/>
                </svg>
            </div>
            <div class="avatar-label">纯代码 · 冲动</div>
        </div>

        <!-- 3. 焦虑 -->
        <div class="defrag-avatar avatar-anxiety">
            <div class="avatar-shadow-layer"></div>
            <div class="avatar-img-layer">
                <svg viewBox="0 0 100 100" class="code-avatar-svg">
                    <rect width="100" height="100" fill="#4e5451"/>
                    <circle cx="50" cy="50" r="28" fill="#2d302f" opacity="0.5"/>
                    <path d="M30,50 Q45,15 60,35 T40,75 T75,50 T32,38 T68,68 T50,25 Z" fill="none" stroke="#1e2421" stroke-width="1.8" stroke-linecap="round"/>
                    <path d="M40,35 Q68,20 55,65 T25,50 T75,40 T45,70 Z" fill="none" stroke="#1e2421" stroke-width="1.2" stroke-linecap="round"/>
                    <path d="M32,60 L68,46 M35,44 L65,62" stroke="#bfa37a" stroke-width="5" opacity="0.85" stroke-linecap="square"/>
                </svg>
            </div>
            <div class="avatar-label">纯代码 · 焦虑</div>
        </div>

        <!-- 4. 完美 -->
        <div class="defrag-avatar avatar-perfection">
            <div class="avatar-shadow-layer"></div>
            <div class="avatar-img-layer">
                <svg viewBox="0 0 100 100" class="code-avatar-svg">
                    <rect width="100" height="100" fill="#191c1a"/>
                    <circle cx="50" cy="50" r="28" fill="none" stroke="#e6dfd3" stroke-width="0.7" opacity="0.8"/>
                    <line x1="50" y1="10" x2="50" y2="90" stroke="#e6dfd3" stroke-width="0.4" opacity="0.5"/>
                    <line x1="10" y1="50" x2="90" y2="50" stroke="#e6dfd3" stroke-width="0.4" opacity="0.5"/>
                    <line x1="50" y1="28" x2="50" y2="72" stroke="#cc665c" stroke-width="2"/>
                    <circle cx="50" cy="28" r="2" fill="#cc665c"/>
                    <polygon points="78,-1 101,-1 101,22" fill="#354230"/>
                    <line x1="78" y1="0" x2="101" y2="23" stroke="#1e2421" stroke-width="1"/>
                </svg>
            </div>
            <div class="avatar-label">纯代码 · 完美</div>
        </div>

        <!-- 7. 逃避 -->
        <div class="defrag-avatar avatar-escapist">
            <div class="avatar-shadow-layer"></div>
            <div class="avatar-img-layer">
                <svg viewBox="0 0 100 100" class="code-avatar-svg">
                    <rect width="100" height="100" fill="#545e56"/>
                    <circle cx="50" cy="45" r="20" fill="#e6dfd3" opacity="0.18"/>
                    <path d="M28,85 Q28,66 50,66 T72,85 Z" fill="#e6dfd3" opacity="0.12"/>
                    <polygon points="-5,20 105,24 105,42 -5,38" fill="#bfa37a" opacity="0.55"/>
                    <polygon points="8,15 95,72 88,85 -2,28" fill="#a68a64" opacity="0.6"/>
                    <polygon points="55,52 88,48 92,68 60,72" fill="#bfa37a" opacity="0.45"/>
                    <circle cx="35" cy="30" r="1" fill="#fff" opacity="0.3"/>
                    <circle cx="68" cy="60" r="1.5" fill="#fff" opacity="0.2"/>
                </svg>
            </div>
            <div class="avatar-label">纯代码 · 逃避</div>
        </div>

        <!-- 10. 真我 -->
        <div class="defrag-avatar avatar-trueself">
            <div class="avatar-shadow-layer"></div>
            <div class="avatar-img-layer">
                <svg viewBox="0 0 100 100" class="code-avatar-svg">
                    <rect width="100" height="100" fill="#e6dfd3"/>
                    <polygon points="8,10 93,6 88,91 12,88" fill="#cc665c"/>
                    <polygon points="20,22 82,18 76,78 24,80" fill="#1e2421"/>
                    <polygon points="38,40 65,36 60,65 35,62" fill="#354230"/>
                    <polygon points="28,25 32,23 30,28" fill="#e6dfd3"/>
                    <polygon points="70,72 74,75 68,76" fill="#cc665c"/>
                </svg>
            </div>
            <div class="avatar-label">纯代码 · 真我</div>
        </div>

        <!-- 11. 天真 · 顽童 -->
        <div class="defrag-avatar v-cute">
            <div class="avatar-shadow-layer"></div>
            <div class="avatar-img-layer">
                <svg viewBox="0 0 100 100" class="code-avatar-svg">
                    <rect width="100" height="100" fill="#cc665c"/>
                    <path d="M 30,85 C 25,60 20,35 45,25 C 70,15 85,35 80,60 C 78,75 75,85 75,85 Z" fill="#e6dfd3"/>
                    <path d="M 45,25 Q 40,12 48,8 Q 48,18 45,25" fill="#1e2421"/>
                    <g fill="none" stroke="#1e2421" stroke-width="2" stroke-linecap="round">
                        <path d="M 38,42 Q 44,38 46,44"/>
                        <path d="M 58,40 Q 64,36 66,42"/>
                        <circle cx="51" cy="52" r="1.5" fill="#1e2421"/>
                    </g>
                    <polygon points="32,48 40,50 38,56 30,54" fill="#cc665c" opacity="0.6"/>
                    <polygon points="66,46 74,48 72,54 64,52" fill="#cc665c" opacity="0.6"/>
                </svg>
            </div>
            <div class="avatar-label">天真 · 顽童</div>
        </div>

        <!-- 14. 激萌 · 内在精灵 -->
        <div class="defrag-avatar v-cute-spirit">
            <div class="avatar-shadow-layer"></div>
            <div class="avatar-img-layer">
                <svg viewBox="0 0 100 100" class="code-avatar-svg">
                    <rect width="100" height="100" fill="#1e2421"/>
                    <path d="M 30,85 C 22,60 25,30 50,25 C 75,20 82,45 78,70 C 76,80 72,85 72,85 Z" fill="#e6dfd3"/>
                    <g fill="none" stroke="#1e2421" stroke-width="2.5" stroke-linecap="round">
                        <path d="M 35,42 L 43,45 L 36,49"/>
                    </g>
                    <polygon points="62,36 65,43 72,43 67,48 69,55 63,51 57,55 59,48 54,43 61,43" fill="#cc665c"/>
                    <path d="M 43,58 Q 47,62 50,58 Q 53,62 57,58" fill="none" stroke="#1e2421" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="33" cy="53" r="5" fill="#cc665c" opacity="0.5"/>
                </svg>
            </div>
            <div class="avatar-label">激萌 · 内在精灵</div>
        </div>

        <!-- 15. 碎裂 · 哭泣 -->
        <div class="defrag-avatar v-weeping">
            <div class="avatar-shadow-layer"></div>
            <div class="avatar-img-layer">
                <svg viewBox="0 0 100 100" class="code-avatar-svg">
                    <rect width="100" height="100" fill="#4d5750"/>
                    <path d="M 20,95 Q 25,45 50,45 Q 75,45 80,95 Z" fill="#1e2421" opacity="0.35"/>
                    <path d="M 28,54 Q 38,46 44,56" fill="none" stroke="#e6dfd3" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
                    <path d="M 56,56 Q 62,46 72,54" fill="none" stroke="#e6dfd3" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
                    <path d="M 46,72 Q 50,66 54,72" fill="none" stroke="#e6dfd3" stroke-width="2" stroke-linecap="round"/>
                    <polygon points="33,58 39,58 37,100 31,100" fill="#e6dfd3"/>
                    <polygon points="61,58 67,58 69,100 63,100" fill="#e6dfd3"/>
                </svg>
            </div>
            <div class="avatar-label">碎裂 · 哭泣</div>
        </div>

        <!-- 16. 爆裂 · 怒火 -->
        <div class="defrag-avatar v-rage">
            <div class="avatar-shadow-layer"></div>
            <div class="avatar-img-layer">
                <svg viewBox="0 0 100 100" class="code-avatar-svg">
                    <rect width="100" height="100" fill="#cc665c"/>
                    <path d="M 10,95 L 25,65 L 12,50 L 38,45 L 25,12 L 52,32 L 72,8 L 72,40 L 92,32 L 80,68 L 92,95 Z" fill="#1e2421"/>
                    <polygon points="28,46 46,51 44,56 26,50" fill="#e6dfd3"/>
                    <polygon points="72,46 54,51 56,56 74,50" fill="#e6dfd3"/>
                    <polygon points="38,68 62,66 60,76 40,78" fill="#e6dfd3"/>
                    <line x1="38" y1="72" x2="62" y2="70" stroke="#1e2421" stroke-width="1.5"/>
                    <line x1="50" y1="67" x2="50" y2="77" stroke="#1e2421" stroke-width="1"/>
                </svg>
            </div>
            <div class="avatar-label">爆裂 · 怒火</div>
        </div>

    </div>

    <!-- SVG 手撕滤镜 -->
    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <filter id="torn-heavy">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="15" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            <filter id="torn-medium">
                <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="5.5" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            <filter id="torn-light">
                <feTurbulence type="fractalNoise" baseFrequency="0.07" numOctaves="2" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            <filter id="hand-torn">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>

</body>
</html>
