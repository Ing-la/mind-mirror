<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心镜 MindMirror - 意识剧场</title>
    <style>
        /* 1. 艺术画布基础基调 */
        :root {
            --bg-canvas: #354230;       /* 深沉的艺术家壁画绿 */
            --color-冲动: #cc665c;     /* 撕裂红 */
            --color-理性: #1e2421;     /* 深邃墨 */
            --color-记忆: #e6dfd3;     /* 纸张白 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-canvas);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 纯CSS生成的粗糙纸张谷物纹理层 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            opacity: 0.08;
            pointer-events: none;
            z-index: 999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* 巨幅解构背景巨字 */
        .bg-title {
            position: absolute;
            font-size: 22vw;
            font-weight: 900;
            color: rgba(0, 0, 0, 0.06);
            line-height: 1;
            pointer-events: none;
            transform: rotate(-8deg);
            white-space: nowrap;
            letter-spacing: -10px;
            z-index: 1;
        }

        /* 贴纸品牌标签 */
        .brand-patch {
            position: absolute;
            top: 40px;
            left: 50px;
            z-index: 100;
            cursor: pointer;
            transform: rotate(-3deg);
            transition: transform 0.3s;
        }
        .brand-patch:hover {
            transform: rotate(-1deg) scale(1.05);
        }
        .brand-patch-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--color-记忆);
            filter: url(#torn-heavy); /* 背景重度撕裂 */
            box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
            z-index: 1;
        }
        .brand-patch-content {
            position: relative;
            z-index: 2;
            padding: 12px 25px;
            color: var(--color-理性);
            filter: url(#torn-medium); /* 💡 品牌字：中度手撕拓印感 */
        }
        .brand-patch h1 { font-size: 1.6rem; font-weight: 900; line-height: 1; letter-spacing: 1px; }
        .brand-patch span { font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; display: block; margin-top: 4px; opacity: 0.6; }

        /* 2. 意识剧场核心网格 */
        .mindscape-stage {
            position: relative;
            width: 90vw;
            height: 85vh;
            max-width: 1400px;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(12, 1fr);
            z-index: 10;
        }

        /* 运动宿主外壳 */
        .motion-host {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform;
            cursor: pointer;
        }

        /* 独立的艺术背景层（承载重度撕裂） */
        .art-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            filter: url(#torn-heavy); /* 💡 背景块：究极重度手撕 */
            z-index: 1;
            backface-visibility: hidden;
        }

        /* 纯净文字内容容器层 */
        .art-content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 【解构块一：召唤心声】 */
        .host-summon { grid-area: 2 / 1 / 10 / 8; z-index: 5; }
        .skin-summon-bg {
            background-color: var(--color-冲动);
            clip-path: polygon(0% 14%, 100% 0%, 86% 100%, 4% 88%);
            mix-blend-mode: multiply;
            transition: clip-path 0.4s;
        }
        .host-summon:hover .skin-summon-bg {
            clip-path: polygon(0% 5%, 96% 0%, 91% 100%, 8% 93%);
        }
        .host-summon .art-content {
            padding: 12% 14% 10% 10%;
            color: var(--color-记忆);
        }

        /* 【解构块二：心声管理】 */
        .host-manage { grid-area: 1 / 7 / 7 / 13; z-index: 4; }
        .skin-manage-bg {
            background-color: var(--color-理性);
            clip-path: polygon(8% 0%, 100% 9%, 91% 91%, 0% 81%);
            transition: background-color 0.4s;
        }
        .host-manage:hover .skin-manage-bg {
            background-color: #151917;
        }
        .host-manage .art-content {
            padding: 10% 10% 10% 15%;
            color: #8da499;
        }

        /* 【解构块三：心路历程】 */
        .host-history { grid-area: 7 / 5 / 13 / 12; z-index: 3; }
        .skin-history-bg {
            background-color: var(--color-记忆);
            clip-path: polygon(2% 7%, 98% 0%, 100% 88%, 0% 98%); /* 微调裁剪，保护胶带 */
        }
        .host-history .art-content {
            padding: 4% 8% 6% 22%; 
            color: #333;
            justify-content: space-between;
        }

        /* 💡 核心优化：三大主标题排版与中度扭曲 */
        .action-title {
            font-size: calc(1.6rem + 1.2vw);
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            filter: url(#torn-title); /* 💡 主标题：与重构版一致的手撕强度 (scale=12) */
        }
        .action-title span { font-size: 3.5vw; opacity: 0.15; font-family: serif; filter: none; }

        /* 💡 核心优化：描述文案稍微调大，并引入极轻微墨水晕染滤镜 */
        .action-desc { 
            font-size: 1.05rem; /* 💡 字号微调放大 */
            line-height: 1.75; 
            font-weight: 400; 
            filter: url(#torn-light); /* 💡 保持完美可读的轻度质感毛边 */
        }

        /* 心路历程专属避让排版：心路居中避开红色卡片遮挡，03固定在右上角 */
        .host-history .action-title {
            color: #1a1a1a;
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .host-history .action-title span {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 4vw;
            opacity: 0.2;
            line-height: 0.8;
        }

        /* 叠纸组件容器 */
        .history-stack-container {
            position: relative;
            width: 100%;
            height: 165px;
            margin-top: 10px;
        }
        
        .paper-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .paper-layer-bg {
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            filter: url(#torn-heavy);
            z-index: 1;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .paper-layer-content {
            position: relative;
            z-index: 2;
            width:100%; height:100%;
            padding: 20px 24px;
            filter: url(#torn-light); /* 💡 卡片内文字：极轻微扭曲，边缘像宣纸浸润 */
        }

        /* 叠纸三层色彩与初始视差 */
        .layer-1 .paper-layer-bg { background: #ffffff; box-shadow: 5px 5px 15px rgba(0,0,0,0.05); }
        .layer-1 { transform: rotate(-1deg); z-index: 3; }
        .layer-2 .paper-layer-bg { background: #eae4d8; }
        .layer-2 { transform: rotate(2deg) translate(5px, 6px); z-index: 2; }
        .layer-3 .paper-layer-bg { background: #dfd7c8; }
        .layer-3 { transform: rotate(-3deg) translate(-4px, 12px); z-index: 1; }

        /* 鼠标悬停卡片惊艳错开 */
        .host-history:hover .layer-1 { transform: rotate(-2.5deg) translate(-2px, -8px); }
        .host-history:hover .layer-2 { transform: rotate(4deg) translate(12px, 10px); }
        .host-history:hover .layer-3 { transform: rotate(-5deg) translate(-10px, 22px); }

        /* 💡 核心优化：卡片内部文本字号放大与行高控制 */
        .layer-1 h4 { font-size: 1.15rem; color: #111; margin-bottom: 6px; font-weight: 800; line-height: 1.5; }
        .layer-1 p { font-size: 0.9rem; color: #556; line-height: 1.6; font-weight: 400; }
        .latest-badge { display: inline-block; font-size: 0.7rem; background: var(--color-冲动); color: #fff; padding: 2px 6px; margin-bottom: 6px; font-weight: bold; }
        .stack-meta { margin-top: 10px; font-size: 0.8rem; color: #888; }

        /* 手撕胶带跳转按钮 */
        .tape-more-btn {
            position: absolute;
            bottom: 22px; 
            right: 35px; 
            z-index: 100;
            cursor: pointer;
            transform: rotate(-4deg);
            transition: all 0.3s;
        }
        .tape-btn-bg {
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background-color: #bfa37a;
            filter: url(#torn-heavy);
            box-shadow: 3px 3px 0px rgba(0,0,0,0.15);
            z-index: 1;
        }
        .tape-btn-content {
            position: relative;
            z-index: 2;
            color: #1e2421;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 6px 20px;
            white-space: nowrap;
            filter: url(#torn-medium); /* 💡 胶带文字：允许中度扭曲 */
        }
        .host-history:hover .tape-more-btn {
            transform: rotate(-1deg) scale(1.05);
        }
        .host-history:hover .tape-btn-bg { background-color: var(--color-冲动); }
        .host-history:hover .tape-btn-content { color: #fff; }

        /* 左下角灵魂独白 */
        .floating-poetry {
            position: absolute;
            bottom: 40px;
            left: 45px;
            color: rgba(230, 223, 211, 0.55); 
            font-size: 0.95rem;
            font-weight: 300;
            writing-mode: vertical-rl;
            letter-spacing: 7px;
            z-index: 2;
            line-height: 1.8;
            /* 💡 诗句：去掉撕裂感，保持纯净 */
        }
    </style>
</head>
<body>

    <div class="bg-title">MIND MIRROR</div>

    <div class="brand-patch" onclick="window.location.reload()">
        <div class="brand-patch-bg"></div>
        <div class="brand-patch-content">
            <h1>心镜</h1>
            <span>MIND MIRROR</span>
        </div>
    </div>

    <div class="floating-poetry">脑海里有一支不愿安静的合唱团 / 走上舞台</div>

    <main class="mindscape-stage" id="stage">

        <div class="motion-host host-summon">
            <div class="art-bg skin-summon-bg"></div>
            <div class="art-content" onclick="console.log('Route: /debate')">
                <h2 class="action-title">召唤心声 <span>01.</span></h2>
                <p class="action-desc">把脑袋里的小人拽出来，看它们好好吵一架。不求正确的解法，只要在这场原始的、粗糙的内心博弈中，看清被情绪掩盖的自我。</p>
            </div>
        </div>

        <div class="motion-host host-manage">
            <div class="art-bg skin-manage-bg"></div>
            <div class="art-content" onclick="console.log('Route: /config')">
                <h2 class="action-title">心声管理 <span>02.</span></h2>
                <p class="action-desc">给内心的声音塑形。在此处捏造“Soul”的极端的性格刻面，对接大模型底层意识。秩序由你定制。</p>
            </div>
        </div>

        <div class="motion-host host-history">
            <div class="art-bg skin-history-bg"></div>
            
            <div class="art-content" onclick="window.location.href='/history-theatre'">
                <h2 class="action-title">心路 <span>03.</span></h2>
                
                <div class="history-stack-container">
                    <div class="paper-layer layer-3"><div class="paper-layer-bg"></div></div>
                    <div class="paper-layer layer-2"><div class="paper-layer-bg"></div></div>
                    <div class="paper-layer layer-1">
                        <div class="paper-layer-bg"></div>
                        <div class="paper-layer-content">
                            <div class="latest-badge">最新的一场拉扯</div>
                            <h4>"我今年30岁单身，存款30万，该逃离一线回老家吗？"</h4>
                            <p>理性先生说大城市才有逆袭机会，而冲动的伊格已经连夜买好了回乡的绿皮车票...</p>
                            <div class="stack-meta">
                                <span>9条辩论火火花</span> · <span>理性 vs 冲动</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tape-more-btn" onclick="window.location.href='/history-theatre'">
                <div class="tape-btn-bg"></div>
                <div class="tape-btn-content">翻阅另外 42 次内心博弈 →</div>
            </div>
        </div>

    </main>

    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <filter id="torn-heavy">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="15" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            
            <filter id="torn-medium">
                <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="5.5" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            
            <filter id="torn-title">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G" />
            </filter>
            
            <filter id="torn-light">
                <feTurbulence type="fractalNoise" baseFrequency="0.07" numOctaves="2" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>

    <script>
        const stage = document.getElementById('stage');
        const hosts = document.querySelectorAll('.motion-host');
        const brand = document.querySelector('.brand-patch');
        
        window.addEventListener('mousemove', (e) => {
            const X = (e.clientX - window.innerWidth / 2) / 120;
            const Y = (e.clientY - window.innerHeight / 2) / 120;
            
            hosts[0].style.transform = `translate(${X * 1.2}px, ${Y * 1.2}px)`;
            hosts[1].style.transform = `translate(${X * -0.8}px, ${Y * -1.5}px)`;
            hosts[2].style.transform = `translate(${X * 0.4}px, ${Y * 0.6}px)`;
            
            brand.style.transform = `translate(${X * -0.2}px, ${Y * -0.2}px) rotate(-3deg)`;
        });

        stage.addEventListener('mouseleave', () => {
            hosts.forEach(h => h.style.transform = '');
            brand.style.transform = 'rotate(-3deg)';
        });
    </script>
</body>
</html>
